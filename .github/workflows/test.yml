name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt boto3 pytest pytest-asyncio
      - run: python -m pytest tests/ -v

  cdk-synth:
    runs-on: ubuntu-latest
    env:
      GH_ORG: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
        working-directory: infra
      - name: CDK synth
        working-directory: infra
        run: npx cdk synth --context githubOrg="$GH_ORG" --context githubRepo="$GH_REPO"
